# ─────────────────────────────────────────────
# server.yaml — Server(Jetson Orin Nano/NX) 전용 설정
# ─────────────────────────────────────────────
#
# default.yaml의 공통값 위에 덮어쓰기(override)된다.
# Server에서만 필요한 STT, Cloud LLM, 인텐트 설정을 정의한다.
#
# TTS는 Edge로 이관됨 → config/edge.yaml 참조
# 타임아웃 메시지는 Edge 로컬 처리 → config/edge.yaml 참조

# ─────────────── STT (음성→텍스트) ───────────────
stt:
  model_size: "large-v3-turbo"    # large-v3 | large-v3-turbo | medium
                                  # large-v3: 최고 정확도, ~3GB VRAM
                                  # large-v3-turbo: 속도/정확도 균형
                                  # medium: 메모리 부족 시 (~1.5GB)
  compute_type: "float16"         # float16 | int8_float16 | int8
                                  # float16: Tensor Core 활용, ~3GB
                                  # int8_float16: 메모리 절약, ~1.5GB
  language: "ko"                  # 기본 언어 (자동 감지도 가능)
  beam_size: 5                    # 빔 서치 크기 (클수록 정확, 느림)
  model_dir: "models/"            # 모델 다운로드/캐시 경로

# ─────────────── 로컬 인텐트 LLM ───────────────
# STT 텍스트를 받아 인텐트를 판단하는 로컬 LLM 설정.
# Cloud LLM 호출 전에 먼저 로컬 LLM으로 인텐트를 분석한다.
#
# model 기본값은 디바이스 프로파일에서 오버라이드된다:
#   jetson_orin_nano (8GB)  → shared/device_profiles.py: "gemma4:e2b"
#   jetson_orin_nx   (16GB) → shared/device_profiles.py: "gemma4:e4b"
local_intent_llm:
  model: "gemma4:e2b"             # 기본값 — 디바이스 프로파일로 오버라이드됨
  base_url: "http://localhost:11434"  # Ollama 서버 주소
  timeout_s: 5                    # 인텐트 분석 타임아웃 (초)
                                  # 5초 초과 시 인텐트 없음으로 처리 → Cloud LLM 호출

# ─────────────── 로컬 인텐트 정의 ───────────────
# 인텐트 이름과 응답 텍스트 정의.
# 로컬 LLM이 인텐트를 감지하면 Cloud LLM 없이 여기서 즉시 응답.
local_intents:
  - name: "end_session"
    responses:
      ko: "대화를 종료합니다. 언제든 다시 불러 주세요."
      en: "End of conversation. Call me anytime."
    save_and_clear_session: true  # 종료 시 대화 히스토리 저장 후 초기화

  - name: "pause_listening"
    responses:
      ko: "네, {duration}분간 대기할게요. 부르시면 다시 들을게요."
      en: "Okay, I'll pause for {duration} minutes. Call me when you're ready."
    default_duration_s: 300       # 기본 5분. Gemma가 duration_s를 추출하면 그 값 사용.
    clear_session: false          # 히스토리 유지 — 복귀 시 이전 대화 이어감

  - name: "list_sessions"
    responses:
      ko: "최근 대화 {count}개입니다. 번호를 말씀해 주세요."
      en: "Here are your last {count} conversations. Please say a number."
    max_list_count: 5             # 최근 세션 최대 표시 개수

# ─────────────── Cloud LLM ───────────────
# API 키는 환경변수로 설정 (YAML에 적지 않음):
#   export ANTHROPIC_API_KEY="sk-ant-..."
#   export OPENAI_API_KEY="sk-..."
cloud:
  provider: "claude"                 # claude | gpt
  claude_model: "claude-haiku-4-5-20251001"  # Claude 모델 (provider: claude일 때)
  gpt_model: "gpt-5-mini"            # GPT 모델 (provider: gpt일 때)
  max_tokens: 1600                   # 최대 응답 길이
                                     # SPOKEN(~200 토큰) + DISPLAY(~800 토큰) 동시 생성
                                     # 기존 800 → 1600으로 상향
  summarize_threshold_tokens: 8000   # 히스토리 요약 트리거 추정 토큰 수
                                     # 글자 수 // 2 로 추정 (tokenizer 없이)
                                     # 8000 ≈ 40턴 (1턴 평균 ~500 토큰)
                                     # 히스토리에는 DISPLAY 섹션 내용만 저장
  timeout_s: 10                      # API 타임아웃 (초)

# ─────────────── 대시보드 ───────────────
# FastAPI WebSocket 서버. gRPC(50051)와 별도 포트.
# proto 변경 없음 — HTTP/WebSocket으로 브라우저에 직접 스트리밍.
#
# 대화 흐름:
#   Cloud LLM [DISPLAY] 섹션 → WebSocket 브로드캐스트 → 브라우저 실시간 타이핑 효과
#   STT 결과(사용자 발화) → WebSocket 브로드캐스트 → 브라우저 사용자 말풍선
dashboard:
  enabled: true
  host: "0.0.0.0"                   # 모든 인터페이스 (LAN 접근 허용)
  port: 8080                        # 브라우저 접속: http://<server_ip>:8080

# ─────────────── 대화 이력 저장 ───────────────
storage:
  db_path: "data/sessions.db"    # SQLite DB 파일 경로

# ─────────────── gRPC (default.yaml 확장) ───────────────
grpc:
  max_workers: 4                  # gRPC 서버 워커 스레드 수

# ─────────────── 모니터링 ───────────────
monitoring:
  prometheus_port: 9090           # Prometheus 메트릭 서버 포트
                                  # 시스템 통계는 백그라운드 폴링 없이 온디맨드로 읽음:
                                  #   - HealthCheck 호출 시 (Edge가 주기적으로 호출)
                                  #   - ProcessVoice 시작/완료 시 (요청별 로깅)

# ─────────────── 전력 관리 ───────────────
power:
  mode: "MAXN"                    # 15W | 25W | MAXN (Super 모드)
                                  # MAXN: GPU 1007MHz, 최대 성능
                                  # 15W: GPU 625MHz, 발열 제한 환경

# ─────────────── 로깅 (default.yaml 확장) ───────────────
logging:
  level: "DEBUG"                  # 개발 중에는 "DEBUG"로 변경
  file: "logs/server.log"         # 로그 파일 경로
