# ─────────────────────────────────────────────
# server.yaml — Server(Jetson Orin Nano/NX) 전용 설정
# ─────────────────────────────────────────────
#
# default.yaml의 공통값 위에 덮어쓰기(override)된다.
# Server에서만 필요한 STT, Cloud LLM, 인텐트 설정을 정의한다.
#
# TTS는 Edge로 이관됨 → config/edge.yaml 참조
# 타임아웃 메시지는 Edge 로컬 처리 → config/edge.yaml 참조

# ─────────────── STT (음성→텍스트) ───────────────
stt:
  model_size: "large-v3-turbo"    # large-v3 | large-v3-turbo | medium
                                  # large-v3: 최고 정확도, ~3GB VRAM
                                  # large-v3-turbo: 속도/정확도 균형
                                  # medium: 메모리 부족 시 (~1.5GB)
  compute_type: "float16"         # float16 | int8_float16 | int8
                                  # float16: Tensor Core 활용, ~3GB
                                  # int8_float16: 메모리 절약, ~1.5GB
  language: "ko"                  # 기본 언어 (자동 감지도 가능)
  beam_size: 5                    # 빔 서치 크기 (클수록 정확, 느림)
  model_dir: "models/"            # 모델 다운로드/캐시 경로

# ─────────────── 인텐트 분류기 ───────────────
# sentence-transformers 기반 임베딩 유사도 분류기.
# 각 인텐트 예시 문장을 사전 임베딩하여 사용자 발화와 코사인 유사도 비교.
# CPU 실행 (~50ms). GPU는 Whisper 전용으로 유지.
intent_classifier:
  model: "paraphrase-multilingual-MiniLM-L12-v2"
  threshold: 0.75                 # 코사인 유사도 임계값. 초과 시 인텐트 확정.
  device: "cpu"

# ─────────────── 인텐트 정의 ───────────────
# 각 인텐트별 예시 문장(examples)과 응답 텍스트(responses).
# 새 인텐트 추가: examples + responses 추가 후 intent_handlers.py에 핸들러 함수 추가.
intents:
  end_session:
    examples:
      # 직접 명령 (존댓말/반말)
      - "대화 종료해줘"
      - "대화 끝내줘"
      - "끝내줘"
      - "그만할게"
      - "여기서 끝내자"
      - "대화 그만하자"
      - "중단해줘"
      # 단형/구어체
      - "대화 끝"
      - "끝"
      - "그만"
      - "종료"
      # 이탈·완료 표현
      - "이만 갈게"
      - "이만 줄일게"
      - "나 이제 가"
      - "이제 됐어"
      - "오늘은 여기까지"
      - "오늘 대화는 여기서 마무리하자"
      - "충분해 고마워"
      # 작별 인사
      - "바이"
      - "바이바이"
      - "잘 있어"
      - "다음에 또 얘기하자"
      - "나중에 또 불를게"
      # 영어
      - "stop the conversation"
      - "end session"
      - "goodbye"
      - "quit"
      - "I'm done"
      - "that's all for now"
      - "I'll stop here"
      - "gotta go"
      - "see you later"
      - "bye"
      - "let's wrap it up"
    responses:
      ko: "대화를 종료합니다. 언제든 다시 불러 주세요."
      en: "End of conversation. Call me anytime."
    save_and_clear_session: true

  pause_listening:
    examples:
      # 명시적 대기 요청
      - "잠깐 멈춰"
      - "잠시 멈춰줘"
      - "잠시 대기해줘"
      - "대기 상태로 있어줘"
      - "조용히 있어줘"
      # 시간 언급
      - "10분만 기다려줘"
      - "잠깐만 기다려"
      - "조금만 기다려줘"
      # 이유 설명 (자리 비움·타인 존재)
      - "잠깐 자리 비울게"
      - "잠깐 자리를 떠야 해"
      - "다른 사람이랑 얘기할게"
      - "누가 와서 잠깐만"
      - "통화해야 해서 잠깐 멈춰줘"
      # 복귀 약속
      - "금방 돌아올게"
      - "이따가 다시 얘기해"
      - "잠깐 있다가 다시 부를게"
      # 영어
      - "pause for a while"
      - "wait a moment"
      - "give me a few minutes"
      - "hold on for a bit"
      - "I'll be right back"
      - "stand by"
      - "be quiet for a moment"
      - "brb"
    responses:
      ko: "네, 10분간 대기할게요. 부르시면 다시 들을게요."
      en: "Okay, I'll pause for 10 minutes. Call me when you're ready."
    save_and_clear_session: false # 히스토리 유지 — 복귀 시 이전 대화 이어감

  list_sessions:
    examples:
      # 목록 조회
      - "지난 대화 보여줘"
      - "이전 대화 목록"
      - "이전 대화 목록 보여줘"
      - "지난 대화 기록 보여줘"
      - "대화 이력 보여줘"
      - "저장된 대화 있어?"
      - "저장된 대화 목록"
      # 이어가기 의도
      - "지난 대화 이어가자"
      - "이전에 하던 대화 이어가고 싶어"
      - "예전에 했던 대화 불러줘"
      - "중단했던 대화 이어가자"
      - "전에 하던 얘기 계속하고 싶어"
      # 영어
      - "show past conversations"
      - "list previous sessions"
      - "show conversation history"
      - "show my saved conversations"
      - "resume a past conversation"
      - "load a previous chat"
      - "what were we talking about before"
    responses:
      ko: "최근 대화 {count}개입니다. 번호를 말씀해 주세요."
      en: "Here are your last {count} conversations. Please say a number."
    max_list_count: 5              # display_enabled: true 시 최대 표시 개수
    max_list_count_voice: 3        # display_enabled: false (음성 전용) 시 최대 표시 개수

# ─────────────── Cloud LLM ───────────────
# API 키는 환경변수로 설정 (YAML에 적지 않음):
#   export ANTHROPIC_API_KEY="sk-ant-..."
#   export OPENAI_API_KEY="sk-..."
cloud:
  provider: "claude"                 # claude | gpt
  claude_model: "claude-haiku-4-5-20251001"  # Claude 모델 (provider: claude일 때)
  gpt_model: "gpt-5.4-mini"          # GPT 모델 (provider: gpt일 때)
  max_tokens: 1600                   # 최대 응답 길이
                                     # SPOKEN(~200 토큰) + DISPLAY(~800 토큰) 동시 생성
                                     # 기존 800 → 1600으로 상향
  summarize_threshold_tokens: 8000   # 히스토리 요약 트리거 추정 토큰 수
                                     # 글자 수 // 2 로 추정 (tokenizer 없이)
                                     # 8000 ≈ 40턴 (1턴 평균 ~500 토큰)
                                     # 히스토리에는 DISPLAY 섹션 내용만 저장
  timeout_s: 15                      # API 타임아웃 (초)

# ─────────────── 대시보드 ───────────────
# FastAPI WebSocket 서버. gRPC(50051)와 별도 포트.
# proto 변경 없음 — HTTP/WebSocket으로 브라우저에 직접 스트리밍.
#
# 대화 흐름:
#   Cloud LLM [DISPLAY] 섹션 → WebSocket 브로드캐스트 → 브라우저 실시간 타이핑 효과
#   STT 결과(사용자 발화) → WebSocket 브로드캐스트 → 브라우저 사용자 말풍선
dashboard:
  enabled: false
  host: "0.0.0.0"                   # 모든 인터페이스 (LAN 접근 허용)
  port: 8080                        # 브라우저 접속: http://<server_ip>:8080

# ─────────────── 대화 이력 저장 ───────────────
storage:
  db_path: "data/sessions.db"    # SQLite DB 파일 경로

# ─────────────── gRPC (default.yaml 확장) ───────────────
grpc:
  max_workers: 4                  # gRPC 서버 워커 스레드 수

# ─────────────── 모니터링 ───────────────
monitoring:
  prometheus_port: 9090           # Prometheus 메트릭 서버 포트
                                  # 시스템 통계는 백그라운드 폴링 없이 온디맨드로 읽음:
                                  #   - HealthCheck 호출 시 (Edge가 주기적으로 호출)
                                  #   - ProcessVoice 시작/완료 시 (요청별 로깅)

# ─────────────── 전력 관리 ───────────────
power:
  mode: "MAXN"                    # 15W | 25W | MAXN (Super 모드)
                                  # MAXN: GPU 1007MHz, 최대 성능
                                  # 15W: GPU 625MHz, 발열 제한 환경

# ─────────────── 로깅 (default.yaml 확장) ───────────────
logging:
  level: "DEBUG"                  # 개발 중에는 "DEBUG"로 변경
  file: "logs/server.log"         # 로그 파일 경로
